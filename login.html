<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LocalPlaces | Sign In</title>
  <meta name="description" content="Sign in to LocalPlaces to personalize your local discovery feed." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-page="auth">

<!-- ===================== LOADING SCREEN ===================== -->
<div id="loading-screen">
  <div class="loader-content">
    <div class="loader-icon-ring">
      <i class="fas fa-map-marker-alt loader-icon"></i>
    </div>
    <h1 class="loader-title">LocalPlaces</h1>
    <p class="loader-sub">Discovering your world…</p>
    <div class="loader-track"><div class="loader-fill"></div></div>
  </div>
</div>

<!-- ===================== AUTH VIEW ===================== -->
<div id="auth-view" class="view hidden">
  <div class="auth-blobs">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>
  <div class="auth-container">
    <div class="auth-hero">
      <div class="brand-icon"><i class="fas fa-map-marker-alt"></i></div>
      <h1 class="brand-name">LocalPlaces</h1>
      <p class="brand-sub">Your AI guide to the world around you</p>
    </div>
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Sign In</button>
        <button class="auth-tab" id="tab-signup" onclick="switchAuthTab('signup')">Sign Up</button>
        <div class="tab-slider" id="tab-slider"></div>
      </div>

      <!-- Login -->
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="field-group">
          <div class="field-wrap">
            <i class="fas fa-envelope field-icon"></i>
            <input type="email" id="login-email" placeholder="Email address" required autocomplete="email" />
          </div>
        </div>
        <div class="field-group">
          <div class="field-wrap">
            <i class="fas fa-lock field-icon"></i>
            <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password" />
          </div>
        </div>
        <button type="submit" class="btn-primary full-w" id="login-btn">
          <span>Sign In</span><i class="fas fa-arrow-right"></i>
        </button>
      </form>

      <!-- Signup -->
      <form id="signup-form" class="hidden" onsubmit="handleSignup(event)">
        <div class="field-group">
          <div class="field-wrap">
            <i class="fas fa-user field-icon"></i>
            <input type="text" id="signup-name" placeholder="Full Name" required autocomplete="name" />
          </div>
        </div>
        <div class="field-group">
          <div class="field-wrap">
            <i class="fas fa-envelope field-icon"></i>
            <input type="email" id="signup-email" placeholder="Email address" required autocomplete="email" />
          </div>
        </div>
        <div class="field-group">
          <div class="field-wrap">
            <i class="fas fa-lock field-icon"></i>
            <input type="password" id="signup-password" placeholder="Password (min 6 chars)" required minlength="6" autocomplete="new-password" />
          </div>
        </div>
        <button type="submit" class="btn-primary full-w" id="signup-btn">
          <span>Create Account</span><i class="fas fa-arrow-right"></i>
        </button>
      </form>

      <div class="or-divider"><span>or</span></div>

      <button class="btn-google" onclick="handleGoogleAuth()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6A7.8 7.8 0 0 0 16.63 9.1c0-.57-.05-1.1-.12-1.1z"/>
          <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
          <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/>
          <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.31z"/>
        </svg>
        Continue with Google
      </button>

      <a class="btn-ghost full-w admin-link" href="admin.html">
        <i class="fas fa-shield-halved"></i> Sponsor Admin
      </a>

    </div>
    <p class="auth-legal">By continuing you agree to our <a href="#">Terms</a> &amp; <a href="#">Privacy</a></p>
  </div>
</div>

<!-- ===================== TOAST ===================== -->
<div id="toast" class="toast hidden">
  <i class="fas fa-check-circle" id="toast-icon"></i>
  <span id="toast-msg">Done!</span>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="assets/js/script.js"></script>
</body>
</html>
